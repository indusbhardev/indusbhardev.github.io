<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATA IPL</title>
    <link href="https://etimg.etb2bimg.com/photo/74594723.cms" rel="icon">
       <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            darkBg: '#10141e',
                            darkCard: '#1a1d29',
                            lightBg: '#f0f2f5',
                            lightCard: '#ffffff',
                            accent: '#00bfff'
                        }
                    }
                }
            }
        }
    </script>

</head>
<body class="bg-brand-lightBg dark:bg-brand-darkBg text-black dark:text-white transition-colors duration-200 min-h-screen font-sans">


<nav class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold text-sky-500">Sports</span>
        </div>

            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                <svg id="moonIcon" class="hidden h-6 w-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sunIcon" class="h-6 w-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.364 6.364l-.707-.707M6.364 17.636l-.707.707M17.636 6.364l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
        </div>
    </nav>


<main class="dashboard">
  
  <section class="channel-group">
    <div class="section-header">
      <h2>Sports 🏀</h2>
    </div>
    <div class="horizontal-scroll-wrapper">
      <div class="grid-container" id="star-sports-grid">
        </div>
    </div>
  </section>

  <section class="channel-group">
    <div class="section-header">
      <h2>More 🏀</h2>
    </div>
    <div class="horizontal-scroll-wrapper">
      <div class="grid-container" id="sony-sports-grid">
        </div>
    </div>
  </section>
  
</main>

<style>
  /* --- Horizontal Scroll Logic --- */
  .horizontal-scroll-wrapper {
    width: 100%;
    overflow-x: auto; /* Enables horizontal scroll */
    overflow-y: hidden;
    padding-bottom: 15px; /* Space for scrollbar */
    scrollbar-width: thin; /* Firefox */
    scrollbar-color: #4dabf7 transparent; /* Firefox */
  }

  /* Custom Scrollbar for Chrome/Safari/Edge */
  .horizontal-scroll-wrapper::-webkit-scrollbar {
    height: 6px;
  }
  .horizontal-scroll-wrapper::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
  }
  .horizontal-scroll-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }

  .grid-container {
    display: flex;
    flex-wrap: nowrap; /* Prevents items from jumping to next line */
    gap: 10px;
      margin: 5px;
    padding-right: 10px; /* Padding at the end of the scroll */
  }

  /* --- Card Styling --- */
  .channel-card {
    flex: 0 0 auto; /* Essential: prevents cards from shrinking */
    background-color: white;
    border-radius: 12px;
    width: 170px; /* Adjusted width */
    overflow: hidden;
    text-decoration: none;
    transition: transform 0.2s;
  }

  .channel-card:hover {
    transform: scale(1.03);
  }

  .logo-container {
    height: 150px;
      width: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
  }

  .logo-container img {
    max-width: 100%;
    max-height: 100%;
      border-radius: 15px;
    object-fit: contain;
  }

  .channel-info {
    background-color: #16202e;
    padding: 12px;
    text-align: center;
    border-top: 1px solid #eeeeee10;
  }

  .channel-info span {
    color: #cbd5e0;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
  }

  .section-header h2 {
    font-size: 1.1rem;
    margin: 5px 10px;
  }
</style>


 <script src="/ipl.js"></script>
</body>
</html>
