<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            darkBg: '#10141e',
                            darkCard: '#1a1d29',
                            lightBg: '#f0f2f5',
                            lightCard: '#ffffff',
                            accent: '#00bfff'
                        }
                    }
                }
            }
        }
    </script>

</head>
<body class="bg-brand-lightBg dark:bg-brand-darkBg text-black dark:text-white transition-colors duration-200 min-h-screen font-sans">


<nav class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold text-sky-500">Sports</span>
        </div>

            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                <svg id="moonIcon" class="hidden h-6 w-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sunIcon" class="h-6 w-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.364 6.364l-.707-.707M6.364 17.636l-.707.707M17.636 6.364l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
        </div>
    </nav>



<main class="dashboard">
  
  <section class="channel-group">
    <div class="section-header">
      <h2>Sports 🏀</h2>
    </div>
    <div class="grid-container" id="star-sports-grid">
      </div>
  </section>

  <section class="channel-group">
    <div class="section-header">
      <h2>More 🏀</h2>
    </div>
    <div class="grid-container" id="sony-sports-grid">
      </div>
  </section>
  
</main>

<style>
  :root {
    --bg-dark: #0f1724;
    --card-bg: #1a2432;
    --card-hover: #253347;
    --text-main: #ffffff;
    --accent-blue: #4dabf7;
  }

  body {
    background-color: var(--bg-dark);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text-main);
    margin: 0;
    padding: 20px;
  }

  .dashboard {
    max-width: 1200px;
    margin: 0 auto;
  }

  .channel-group {
    margin-bottom: 40px;
  }

  .section-header h2 {
    font-size: 1.2rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .grid-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
  }

  /* Individual Card Styling */
  .channel-card {
    background-color: white; /* Matches white top half in screenshot */
    border-radius: 12px;
    width: 160px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease;
    text-decoration: none;
    display: flex;
    flex-direction: column;
  }

  .channel-card:hover {
    transform: translateY(-5px);
  }

  .logo-container {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  .logo-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .channel-info {
    background-color: var(--card-bg); /* Dark bottom half */
    padding: 12px;
    text-align: center;
  }

  .channel-info span {
    color: #cbd5e0;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>


    
<script>
    const channels = [
  { 
    name: "STAR HINDI", 
    logo: "https://example.com/starhindi.png", 
    url: "https://example.com/starhindi.mp4", 
    keyId: "jhgd7676", 
    key: "jhgdfj8786", 
    cookie: "jshj8h.fhu8h"
  },
  {  
    name: "STAR ENGLISH", 
    logo: "https://example.com/stareng.png", 
    url: "https://example.com/stareng.mp4", 
    keyId: "jhgd5f6", 
    key: "jhggh786", 
    cookie: "jshjgh7.hu8h"
  }
];

const grid = document.getElementById('star-sports-grid');

channels.forEach(ch => {
  // Construct the long URL
  const destination = `https://indusbhar.blospot.com/?url=${ch.url}&name=${encodeURIComponent(ch.name)}&keyid=${ch.keyId}&key=${ch.key}&cookie=${ch.cookie}`;

  // Create the HTML structure
  const card = document.createElement('a');
  card.href = destination;
  card.className = 'channel-card';
  card.target = "_blank"; // Opens in new tab

  card.innerHTML = `
    <div class="logo-container">
      <img src="${ch.logo}" alt="${ch.name}">
    </div>
    <div class="channel-info">
      <span>${ch.name}</span>
    </div>
  `;

  grid.appendChild(card);
});
</script>
</body>
</html>
