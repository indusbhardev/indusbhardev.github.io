<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Streaming</title>
    <link rel="stylesheet" href="https://indusbhardev.github.io/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-[#0f111a] text-black dark:text-white min-h-screen transition-colors duration-300">

    <nav class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-[#0f111a] sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-sky-500">Sports</h1>
        
        <div class="flex items-center gap-4">
            <input type="text" id="searchInput" placeholder="Search..." 
                   class="bg-gray-200 dark:bg-gray-800 rounded-full px-4 py-1.5 w-40 md:w-64 focus:outline-none focus:ring-2 focus:ring-sky-500">
            
            <button id="themeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:opacity-80">
                <span id="themeIcon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="p-6 space-y-12">
        <section>
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-xl font-bold">Sports 🏀</h2>
            </div>
            <div id="sportsGrid" class="flex gap-6 overflow-x-auto pb-6 no-scrollbar">
                </div>
        </section>

        <section>
            <div class="flex items-center gap-2 mb-4">
                <h2 class="text-xl font-bold">More 🏀</h2>
            </div>
            <div id="moreGrid" class="flex gap-6 overflow-x-auto pb-6 no-scrollbar">
                </div>
        </section>
    </main>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
            class="fixed bottom-6 right-6 bg-sky-500 p-3 rounded-full shadow-lg text-white">
        ↑
    </button>







    <script src="https://indusbhardev.github.io/script.js"></script>
</body>
</html>
