<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Streaming</title>
    <link href="https://img.pikbest.com/png-images/20250220/flaming-cricket-ball-fiery-sports-illustration_11541518.png!sw800" rel="icon">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            darkBg: '#10141e',
                            darkCard: '#1a1d29',
                            lightBg: '#f0f2f5',
                            lightCard: '#ffffff',
                            accent: '#00bfff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
                /* Custom scrollbar for better visual integration */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .dark ::webkit-scrollbar-track {
            background: #10141e;
        }
        ::webkit-scrollbar-track {
            background: #f0f2f5;
        }
        .dark ::webkit-scrollbar-thumb {
            background: #2a2e3b;
            border-radius: 4px;
        }
        ::webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .ipl {
            height: 200px;
            width: 300px;
        }
    </style>
</head>
<body class="bg-brand-lightBg dark:bg-brand-darkBg text-black dark:text-white transition-colors duration-200 min-h-screen font-sans">

    <nav class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold text-sky-500">Sports</span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search channels..." 
                       class="bg-gray-200 dark:bg-gray-800 text-sm rounded-full px-4 py-2 w-40 focus:outline-none focus:ring-2 focus:ring-sky-500">
                <svg class="absolute right-3 top-2.5 h-4 w-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                <svg id="moonIcon" class="hidden h-6 w-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sunIcon" class="h-6 w-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.364 6.364l-.707-.707M6.364 17.636l-.707.707M17.636 6.364l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="p-6 md:p-10 space-y-10">

        <div class="ipl"><a href="/ipl.html"><img src="https://storage.googleapis.com/pitchonnet-news-photo/news-photo/35953.temp.jpg"/></a></div>
        <section>
            <div class="flex items-center gap-2 mb-6">
                <h2 class="text-2xl font-semibold">Sports</h2>
                <span class="text-xl">🏀</span>
            </div>
            <div id="sportsGrid" class="flex flex-nowrap gap-6 overflow-x-auto pb-4 -mb-4">
                </div>
        </section>

        <section>
            <div class="flex items-center gap-2 mb-6">
                <h2 class="text-2xl font-semibold">More</h2>
                <span class="text-xl">🏀</span>
            </div>
            <div id="moreGrid" class="flex flex-nowrap gap-6 overflow-x-auto pb-4 -mb-4">
                </div>
        </section>

    </main>

    <button class="fixed bottom-6 right-6 bg-sky-500 text-white p-3 rounded-full shadow-lg hover:bg-sky-600 transition">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
    </button>

<script src="https://indusbhardev.github.io/script.js"></script>
</body>
</html>
